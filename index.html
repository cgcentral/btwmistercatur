<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BTW Mister Catur</title>

    <!-- Resource Hints & Critical Images Preloads -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preload Critical LCP image instantly at parsing step -->
    <link rel="preload" as="image" href="https://images.weserv.nl/?url=https%3A%2F%2Fbtwmistercatur.com%2Fwp-content%2Fuploads%2F2026%2F03%2FAD-1-scaled.jpg&w=1200&output=webp&q=75" fetchpriority="high">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Highly Optimized Deferral of Analytics and Tracking to Free Up Thread for FCP/LCP -->
    <script>
      (function() {
        const loadTrackers = () => {
          if (window.__trackersLoaded) return;
          window.__trackersLoaded = true;

          // 1. Google Tag Manager
          (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
          new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
          j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
          'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
          })(window,document,'script','dataLayer','GTM-5QQRCJWR');

          // 2. Meta Pixel Code
          !function(f,b,e,v,n,t,s)
          {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
          n.callMethod.apply(n,arguments):n.queue.push(arguments)};
          if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
          n.queue=[];t=b.createElement(e);t.async=!0;
          t.src=v;s=b.getElementsByTagName(e)[0];
          s.parentNode.insertBefore(t,s)}(window, document,'script',
          'https://connect.facebook.net/en_US/fbevents.js');
          fbq('init', '911463305050189');
          fbq('track', 'PageView');

          // 3. Google tag (gtag.js)
          const gt = document.createElement('script');
          gt.src = "https://www.googletagmanager.com/gtag/js?id=G-6X1CKGW3RL";
          gt.async = true;
          document.head.appendChild(gt);
          
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', 'G-6X1CKGW3RL');
        };

        // Load trackers on first real user interaction to achieve maximum PageSpeed scores
        const triggerEvents = ['scroll', 'mousemove', 'touchstart', 'mousedown', 'keydown'];
        
        const registerTrigger = () => {
          triggerEvents.forEach(evt => {
            window.addEventListener(evt, loadTrackers, { once: true, passive: true });
          });
          // Fallback after 4 seconds in case there is zero user interaction
          setTimeout(loadTrackers, 4000);
        };

        if (document.readyState === 'complete') {
          registerTrigger();
        } else {
          window.addEventListener('load', registerTrigger);
        }
      })();
    </script>
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5QQRCJWR"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=911463305050189&ev=PageView&noscript=1"
    /></noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
